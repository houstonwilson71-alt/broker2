services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: sniper
      POSTGRES_PASSWORD: sniper
      POSTGRES_DB: sniper
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - sniper

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save ""
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - sniper

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    # Use host networking because Docker bridge has no outbound internet access
    # in this environment; the host network can reach the BSC RPC endpoints.
    network_mode: host
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://sniper:sniper@localhost:5432/sniper?sslmode=disable
      REDIS_URL: redis://localhost:6379/0
      API_PORT: "8080"
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - sniper

volumes:
  postgres_data:
  redis_data:

networks:
  sniper:
    driver: bridge
